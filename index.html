<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>피투성이 대공의 품에 안겨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #main-frame { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <!-- 오디오는 shell에만 존재 — 페이지 전환 시 절대 중단되지 않음 -->
  <audio id="bgm" src="rsc/blood-soaked duke.mp3" loop preload="auto"></audio>

  <!-- 모든 콘텐츠 페이지를 iframe 안에서 전환 -->
  <iframe id="main-frame" src="home.html" allow="autoplay"></iframe>

  <script>
    const bgm = document.getElementById('bgm');
    const frame = document.getElementById('main-frame');

    // ── 자식 iframe에서 호출하는 네비게이션 함수 ──
    window.navigateTo = function(url) {
      frame.src = url;
    };

    // ── BGM 재생 시도 ──
    function tryPlay() {
      return bgm.play().catch(() => null);
    }

    // iframe 로드 시마다 재생 시도 (동일 출처 iframe 내 사용자 제스처가 unlock해줌)
    frame.addEventListener('load', function() {
      tryPlay();
    });

    // shell 자체에 클릭이 있을 경우에도 unlock 시도
    document.addEventListener('click', function() {
      tryPlay();
    }, { once: true });
  </script>

</body>
</html>
